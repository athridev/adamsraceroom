name: Apply Japan Drift Online Fixes

on:
  push:
    paths:
      - .github/workflows/apply-japandrift-online-fixes.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Load and apply saved fix patch
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/athridev/japandrift/a342ecd2bcf2c4a66fc9d63c5af2bf7528b4fec5/.github/workflows/apply-japandrift-online-fixes.yml" > /tmp/source-workflow.yml
          awk "found && /^PATCH_B64$/ {exit} found {print} /<<'PATCH_B64'/ {found=1}" /tmp/source-workflow.yml > /tmp/japandrift-online-fixes.patch.gz.b64
          test -s /tmp/japandrift-online-fixes.patch.gz.b64
          base64 -d /tmp/japandrift-online-fixes.patch.gz.b64 | gunzip > /tmp/japandrift-online-fixes.patch
          git apply --index --whitespace=nowarn /tmp/japandrift-online-fixes.patch
          rm -f .github/workflows/apply-japandrift-online-fixes.yml
          git add -A
          git config user.name "Codex"
          git config user.email "codex@openai.com"
          git commit -m "Fix online race result handling"
          git push
