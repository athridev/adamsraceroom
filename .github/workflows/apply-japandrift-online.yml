name: Apply Japan Drift Online

on:
  push:
    paths:
      - .github/workflows/apply-japandrift-online.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Load and apply saved patch
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/athridev/japandrift/4610a965e5a0317cfdb5ea8aa757e1068c9eca0a/.github/workflows/apply-japandrift-online.yml" > /tmp/source-workflow.yml
          awk "found && /^PATCH_B64$/ {exit} found {print} /<<'PATCH_B64'/ {found=1}" /tmp/source-workflow.yml > /tmp/japandrift-online.patch.gz.b64
          test -s /tmp/japandrift-online.patch.gz.b64
          base64 -d /tmp/japandrift-online.patch.gz.b64 | gunzip > /tmp/japandrift-online.patch
          git apply --index --whitespace=nowarn /tmp/japandrift-online.patch
          rm -f .github/workflows/apply-japandrift-online.yml
          git add -A
          git config user.name "Codex"
          git config user.email "codex@openai.com"
          git commit -m "Add Japan Drift online mode"
          git push
