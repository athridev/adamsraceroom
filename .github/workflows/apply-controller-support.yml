name: Apply controller support patch

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-controller-support:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Apply tested controller patch
        run: |
          if grep -q "function touchControlsEnabled" index.html; then
            echo "Controller support patch is already present."
          else
            git apply <<'PATCH'
